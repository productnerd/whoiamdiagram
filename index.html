<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Good Life, fair copy</title>
<style>
  :root{
    --paper:#e8e6df; --ink:#2f3f96; --ink-deep:#1b2566;
    --graphite:#6f6d66; --graphite-soft:#9b9992; --red:#a8232c; --rule:#c5c2b8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--paper);color:var(--ink-deep);
    font-family:"Inter","Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased}
  body{display:flex;flex-direction:column;overflow:hidden}
  header{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
    padding:16px 24px 12px;border-bottom:1px solid var(--rule);z-index:3}
  h1{margin:0;font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    font-weight:400;font-size:20px}
  h1 em{font-style:italic;color:var(--red)}
  .sub{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--graphite)}
  .spacer{flex:1}
  .controls{display:flex;gap:6px;flex-wrap:wrap}
  button{font:inherit;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    padding:6px 11px;border:1px solid var(--rule);background:transparent;color:var(--graphite);
    border-radius:999px;cursor:pointer;transition:.15s}
  button:hover{border-color:var(--graphite)}
  button:focus-visible{outline:2px solid var(--red);outline-offset:2px}
  button[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:var(--paper)}
  .stage{flex:1;position:relative;min-height:0}
  svg#map{width:100%;height:100%;display:block;cursor:grab;touch-action:none}
  svg#map.dragging{cursor:grabbing}
  .node{cursor:pointer}
  .node text{pointer-events:none;paint-order:stroke;stroke:var(--paper);stroke-width:3px;stroke-linejoin:round}
  .ring{fill:rgba(232,230,223,.8)}
  .faded{opacity:.1}
  .gone{display:none}
  aside{position:absolute;right:20px;bottom:20px;width:280px;max-width:calc(100% - 40px);
    background:rgba(238,236,230,.95);border:1px solid var(--rule);padding:16px 18px 18px;
    opacity:0;transform:translateY(6px);transition:.18s;pointer-events:none}
  aside.on{opacity:1;transform:none;pointer-events:auto}
  aside h2{margin:0 0 2px;font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    font-weight:400;font-size:19px}
  aside .greek{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    font-style:italic;font-size:14px;color:var(--graphite);margin:0 0 8px}
  aside p.note{margin:0 0 10px;font-size:13px;line-height:1.5}
  aside h3{margin:12px 0 6px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--graphite)}
  aside ul{margin:0;padding:0;list-style:none;display:flex;flex-wrap:wrap;gap:5px}
  aside li{font-size:12px;border:1px solid var(--rule);padding:3px 8px;border-radius:999px;cursor:pointer}
  aside li:hover{border-color:var(--ink);color:var(--ink)}
  aside li.cross{border-style:dashed}
  .close{position:absolute;top:8px;right:10px;border:0;padding:4px;font-size:14px;color:var(--graphite)}
  .hint{position:absolute;left:24px;bottom:22px;font-size:11px;color:var(--graphite-soft);
    max-width:210px;line-height:1.7}
  @media (max-width:640px){ header{padding:14px 16px 10px} .hint{display:none}
    aside{right:12px;left:12px;bottom:12px;width:auto} }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<header>
  <h1>The <em>Good Life</em>, fair copy</h1>
  <span class="sub">six branches</span>
  <span class="spacer"></span>
  <div class="controls">
    <button id="cross" aria-pressed="true">cross-links</button>
    <button id="collapse">collapse all</button>
    <button id="reset">reset</button>
  </div>
</header>

<div class="stage">
  <svg id="map"></svg>
  <div class="hint">Click a branch to fold or unfold it. Click any node to trace what it touches. Drag to move, scroll to zoom.</div>
  <aside id="panel">
    <button class="close" id="close" aria-label="Close">✕</button>
    <h2 id="p-title"></h2>
    <p class="greek" id="p-greek"></p>
    <p class="note" id="p-note"></p>
    <div id="p-body"></div>
  </aside>
</div>

<script>
const SVGNS = "http://www.w3.org/2000/svg";

/* ---------------- the page, reorganised ---------------- */
const GROUPS = [
  {id:"work",      label:"work",        note:"How the good life earns its keep. The one branch drawn in pencil, not ink."},
  {id:"ideals",    label:"ideals",      note:"What is worth aiming at, whether or not you get there."},
  {id:"character", label:"character",   note:"How you carry yourself while aiming. The Greek words live here."},
  {id:"people",    label:"people",      note:"The good life is not a solo sport."},
  {id:"mind",      label:"mind",        note:"Thinking as a way of leaving yourself behind."},
  {id:"body",      label:"body & wild", note:"Depth, altitude, weather, effort. The parts that leave a mark on you."}
];

const LEAVES = [
  {id:"truth", g:"ideals"}, {id:"good", g:"ideals"}, {id:"beauty", g:"ideals"},
  {id:"freedom", g:"ideals"}, {id:"play", g:"ideals"},
  {id:"arete", g:"character", greek:"ἀρετή", note:"Excellence. Being the best version of the thing you are."},
  {id:"sophrosyne", g:"character", greek:"σωφροσύνη", note:"Temperance. Knowing your own measure."},
  {id:"philotimo", g:"character", greek:"φιλότιμο", note:"Doing right because of who you are, not because anyone is watching."},
  {id:"meraki", g:"character", greek:"μεράκι", note:"Leaving something of your soul in the work."},
  {id:"soul", g:"character"},
  {id:"family, friends & community", g:"people"},
  {id:"human connection", g:"people"},
  {id:"things I love with people I love", g:"people"},
  {id:"intellectual life", g:"mind"}, {id:"self-transcendence", g:"mind"},
  {id:"life of creation", g:"work"}, {id:"self-expression", g:"work"},
  {id:"nature & wildness", g:"body"}, {id:"athleticism", g:"body"},
  {id:"adventure & new experiences", g:"body"},
  {id:"education", g:"work"}, {id:"life skills", g:"work"}, {id:"game design", g:"work"},
  {id:"board games", g:"work"}, {id:"edtech", g:"work"},
  {id:"humane, ethical entrepreneurship", g:"work"}, {id:"F&B", g:"work"}, {id:"product", g:"work"}
];

const BRANCH = [
  ["ideals","truth"],["ideals","good"],["ideals","beauty"],["ideals","freedom"],["ideals","play"],
  ["character","arete"],["character","sophrosyne"],["character","philotimo"],["character","meraki"],["character","soul"],
  ["people","family, friends & community"],["people","human connection"],["people","things I love with people I love"],
  ["mind","intellectual life"],["intellectual life","self-transcendence"],
  ["work","life of creation"],["work","self-expression"],
  ["body","nature & wildness"],["body","athleticism"],["body","adventure & new experiences"],
  ["work","education"],["education","life skills"],["education","edtech"],["education","game design"],
  ["game design","board games"],["edtech","humane, ethical entrepreneurship"],
  ["humane, ethical entrepreneurship","F&B"],["humane, ethical entrepreneurship","product"]
];

const CROSS = [
  ["play","game design"],["play","board games"],
  ["truth","intellectual life"],
  ["good","humane, ethical entrepreneurship"],["good","education"],
  ["beauty","life of creation"],["beauty","F&B"],
  ["freedom","adventure & new experiences"],["freedom","humane, ethical entrepreneurship"],
  ["arete","athleticism"],["arete","product"],
  ["sophrosyne","nature & wildness"],
  ["philotimo","humane, ethical entrepreneurship"],
  ["meraki","life of creation"],
  ["soul","human connection"],
  ["self-transcendence","nature & wildness"],
  ["self-expression","product"],
  ["life of creation","ideals"],["self-expression","ideals"],
  ["life of creation","product"],
  ["human connection","F&B"],
  ["things I love with people I love","board games"],
  ["things I love with people I love","humane, ethical entrepreneurship"],
  ["athleticism","nature & wildness"],["adventure & new experiences","nature & wildness"],
  ["life skills","athleticism"],["life skills","character"],
  ["intellectual life","education"]
];

/* ---------------- model ---------------- */
const nodes = [
  {id:"good life", kind:"core", g:"core", greek:"εὐδαιμονία",
   note:"The centre of the page. Eudaimonia is only its Greek name: not a mood, a whole life gone well."},
  ...GROUPS.map(g => ({id:g.id, label:g.label, kind:"hub", g:g.id, note:g.note})),
  ...LEAVES.map(l => ({...l, kind:"leaf"}))
];
const byId = new Map(nodes.map(n => [n.id, n]));
const links = [
  ...GROUPS.map(g => ({s:"good life", t:g.id, type:"spine"})),
  ...BRANCH.map(([s,t]) => ({s, t, type:"branch"})),
  ...CROSS.map(([s,t]) => ({s, t, type:"cross"}))
].map(l => ({...l, source:byId.get(l.s), target:byId.get(l.t)}));

const nbrs = new Map(nodes.map(n => [n.id, new Set()]));
const crossOf = new Map(nodes.map(n => [n.id, new Set()]));
links.forEach(l => {
  nbrs.get(l.s).add(l.t); nbrs.get(l.t).add(l.s);
  if(l.type === "cross"){ crossOf.get(l.s).add(l.t); crossOf.get(l.t).add(l.s); }
});

const inkOf = n => n.kind === "core" ? "#a8232c"
  : n.g === "work" ? "#6f6d66"
  : n.kind === "hub" ? "#1b2566" : "#2f3f96";
const radOf = n => n.kind === "core" ? 48 : n.kind === "hub" ? 38 : 28;
const ANGLE = {};
GROUPS.forEach((g,i) => ANGLE[g.id] = Math.PI * 0.86 + (i / GROUPS.length) * Math.PI * 2);

/* ---------------- drawing ---------------- */
const svg = document.getElementById("map");
const view = document.createElementNS(SVGNS,"g");
const gLink = document.createElementNS(SVGNS,"g");
const gNode = document.createElementNS(SVGNS,"g");
view.appendChild(gLink); view.appendChild(gNode); svg.appendChild(view);

links.forEach(l => {
  const line = document.createElementNS(SVGNS,"line");
  const workish = l.source.g === "work" || l.target.g === "work";
  line.setAttribute("stroke", l.type === "cross" ? "#a8232c" : workish ? "#9b9992" : "#8f96c4");
  line.setAttribute("stroke-opacity", l.type === "cross" ? .3 : 1);
  line.setAttribute("stroke-width", l.type === "spine" ? 1.4 : 1);
  line.setAttribute("stroke-dasharray", l.type === "cross" ? "1 4" : l.type === "spine" ? "3 4" : "1 5");
  line.setAttribute("stroke-linecap","round");
  l.el = line; gLink.appendChild(line);
});

nodes.forEach(n => {
  const g = document.createElementNS(SVGNS,"g");
  g.setAttribute("class","node");
  const r = radOf(n), ink = inkOf(n);

  const e1 = document.createElementNS(SVGNS,"ellipse");
  e1.setAttribute("class","ring");
  e1.setAttribute("rx", r); e1.setAttribute("ry", r*0.62);
  e1.setAttribute("stroke", ink);
  e1.setAttribute("stroke-width", n.kind === "leaf" ? 1 : 1.6);
  g.appendChild(e1);

  const e2 = document.createElementNS(SVGNS,"ellipse");   // the pen going round twice
  e2.setAttribute("rx", r*0.985); e2.setAttribute("ry", r*0.645);
  e2.setAttribute("transform","rotate(-1.6) translate(0.8 -0.6)");
  e2.setAttribute("fill","none");
  e2.setAttribute("stroke", ink);
  e2.setAttribute("stroke-opacity",".45");
  e2.setAttribute("stroke-width",".8");
  g.appendChild(e2);

  const words = (n.label || n.id).split(" ");
  const max = n.kind === "core" ? 9 : 13;
  const lines = []; let cur = "";
  words.forEach(w => {
    if((cur + " " + w).trim().length > max && cur){ lines.push(cur); cur = w; }
    else cur = (cur + " " + w).trim();
  });
  if(cur) lines.push(cur);

  const size = n.kind === "core" ? 15 : n.kind === "hub" ? 12 : 11;
  const t = document.createElementNS(SVGNS,"text");
  t.setAttribute("text-anchor","middle");
  t.setAttribute("fill", ink);
  t.setAttribute("font-size", size);
  t.setAttribute("font-family", (n.kind !== "leaf" || n.greek)
    ? '"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif'
    : '"Inter","Helvetica Neue",Arial,sans-serif');
  if(n.greek) t.setAttribute("font-style","italic");
  t.setAttribute("letter-spacing", n.kind === "hub" ? "1.6" : n.kind === "core" ? "0.8" : "0");
  lines.forEach((ln,i) => {
    const ts = document.createElementNS(SVGNS,"tspan");
    ts.setAttribute("x", 0);
    ts.setAttribute("y", (i - (lines.length-1)/2) * (size + 2.5) + size*0.34);
    ts.textContent = n.kind === "hub" ? ln.toUpperCase() : ln;
    t.appendChild(ts);
  });
  g.appendChild(t);

  n.el = g; gNode.appendChild(g);
});

/* ---------------- a small force simulation ---------------- */
let W = 800, H = 600;
const core = byId.get("good life");

function anchor(n){
  if(n.kind === "core") return [W/2, H/2];
  const a = ANGLE[n.g] ?? 0;
  const r = Math.min(W,H) * (n.kind === "hub" ? 0.27 : 0.46);
  return [W/2 + Math.cos(a) * r * 1.3, H/2 + Math.sin(a) * r];
}
function seed(){
  nodes.forEach(n => {
    const [ax, ay] = anchor(n);
    n.x = ax + (Math.random()-.5) * 40;
    n.y = ay + (Math.random()-.5) * 40;
    n.vx = 0; n.vy = 0;
  });
  core.x = W/2; core.y = H/2;
}

const SPRING = {spine:210, branch:100, cross:230};
let alpha = 1, dragged = null;

function step(){
  const live = nodes.filter(n => !n.gone);
  // repulsion
  for(let i=0;i<live.length;i++){
    const a = live[i];
    for(let j=i+1;j<live.length;j++){
      const b = live[j];
      let dx = b.x-a.x, dy = b.y-a.y;
      let d2 = dx*dx + dy*dy;
      if(d2 < 1){ dx = Math.random()-.5; dy = Math.random()-.5; d2 = 1; }
      if(d2 > 640000) continue;
      const d = Math.sqrt(d2);
      const q = (a.kind === "leaf" ? 1 : 2.1) * (b.kind === "leaf" ? 1 : 2.1);
      const f = 2200 * q / d2;
      const ux = dx/d, uy = dy/d;
      a.vx -= f*ux; a.vy -= f*uy;
      b.vx += f*ux; b.vy += f*uy;
    }
  }
  // springs
  links.forEach(l => {
    if(l.gone) return;
    const a = l.source, b = l.target;
    const dx = b.x-a.x, dy = b.y-a.y;
    const d = Math.hypot(dx,dy) || 1;
    const k = l.type === "cross" ? 0.004 : 0.055;
    const f = k * (d - SPRING[l.type]);
    const ux = dx/d, uy = dy/d;
    a.vx += f*ux; a.vy += f*uy;
    b.vx -= f*ux; b.vy -= f*uy;
  });
  // anchors
  live.forEach(n => {
    const [ax, ay] = anchor(n);
    const s = n.kind === "core" ? .2 : n.kind === "hub" ? .035 : .02;
    n.vx += (ax - n.x) * s;
    n.vy += (ay - n.y) * s;
  });
  // integrate
  live.forEach(n => {
    if(n === dragged || n.kind === "core"){ n.vx = n.vy = 0; return; }
    n.vx *= 0.78; n.vy *= 0.78;
    const v = Math.hypot(n.vx, n.vy);
    if(v > 22){ n.vx *= 22/v; n.vy *= 22/v; }
    n.x += n.vx * alpha; n.y += n.vy * alpha;
  });
  // collision
  for(let pass=0; pass<2; pass++){
    for(let i=0;i<live.length;i++){
      for(let j=i+1;j<live.length;j++){
        const a = live[i], b = live[j];
        const min = radOf(a) + radOf(b) + 10;
        let dx = b.x-a.x, dy = b.y-a.y;
        const d = Math.hypot(dx,dy) || 1;
        if(d < min){
          const push = (min - d) / 2;
          const ux = dx/d, uy = dy/d;
          if(a !== dragged && a.kind !== "core"){ a.x -= ux*push; a.y -= uy*push; }
          if(b !== dragged && b.kind !== "core"){ b.x += ux*push; b.y += uy*push; }
        }
      }
    }
  }
  core.x = W/2; core.y = H/2;
  paint();
  alpha = Math.max(0.25, alpha * 0.995);
  requestAnimationFrame(step);
}

function paint(){
  nodes.forEach(n => n.el.setAttribute("transform", `translate(${n.x.toFixed(1)},${n.y.toFixed(1)})`));
  links.forEach(l => {
    if(l.gone) return;
    l.el.setAttribute("x1", l.source.x.toFixed(1)); l.el.setAttribute("y1", l.source.y.toFixed(1));
    l.el.setAttribute("x2", l.target.x.toFixed(1)); l.el.setAttribute("y2", l.target.y.toFixed(1));
  });
}

/* ---------------- fold, select, filter ---------------- */
const folded = new Set();
let showCross = true;

function render(){
  nodes.forEach(n => {
    n.gone = (n.kind === "leaf" && folded.has(n.g));
    n.el.classList.toggle("gone", !!n.gone);
  });
  links.forEach(l => {
    l.gone = l.source.gone || l.target.gone || (l.type === "cross" && !showCross);
    l.el.classList.toggle("gone", !!l.gone);
  });
  alpha = 1;
}

const panel = document.getElementById("panel");
function select(id){
  const n = byId.get(id), near = nbrs.get(id);
  nodes.forEach(m => m.el.classList.toggle("faded", m.id !== id && !near.has(m.id)));
  links.forEach(l => l.el.classList.toggle("faded", l.s !== id && l.t !== id));
  document.getElementById("p-title").textContent = n.label || n.id;
  const gk = document.getElementById("p-greek");
  gk.textContent = n.greek || ""; gk.style.display = n.greek ? "block" : "none";
  const nt = document.getElementById("p-note");
  nt.textContent = n.note || ""; nt.style.display = n.note ? "block" : "none";

  const within = [...near].filter(k => !crossOf.get(id).has(k) && !byId.get(k).gone);
  const across = [...crossOf.get(id)].filter(k => !byId.get(k).gone);
  const body = document.getElementById("p-body");
  body.innerHTML = "";
  const list = (title, arr, cls) => {
    if(!arr.length) return;
    const h = document.createElement("h3"); h.textContent = title; body.appendChild(h);
    const ul = document.createElement("ul");
    arr.forEach(k => {
      const li = document.createElement("li");
      li.className = cls; li.textContent = byId.get(k).label || k;
      li.onclick = () => select(k);
      ul.appendChild(li);
    });
    body.appendChild(ul);
  };
  list("Branch", within, "");
  if(showCross) list("Reaches across", across, "cross");
  panel.classList.add("on");
}
function clearSel(){
  nodes.forEach(n => n.el.classList.remove("faded"));
  links.forEach(l => l.el.classList.remove("faded"));
  panel.classList.remove("on");
}
document.getElementById("close").onclick = clearSel;

/* ---------------- pointer: drag nodes, pan, zoom ---------------- */
let k = 1, tx = 0, ty = 0;
function applyView(){ view.setAttribute("transform", `translate(${tx},${ty}) scale(${k})`); }
function toWorld(ev){
  const r = svg.getBoundingClientRect();
  const sx = (ev.clientX - r.left) * (W / r.width);
  const sy = (ev.clientY - r.top)  * (H / r.height);
  return [(sx - tx) / k, (sy - ty) / k];
}

let panning = null, moved = false;
nodes.forEach(n => {
  n.el.addEventListener("pointerdown", ev => {
    ev.stopPropagation();
    n.el.setPointerCapture(ev.pointerId);
    dragged = n; moved = false;
    alpha = 1;
  });
  n.el.addEventListener("pointermove", ev => {
    if(dragged !== n) return;
    const [wx, wy] = toWorld(ev);
    if(n.kind !== "core"){ n.x = wx; n.y = wy; n.vx = n.vy = 0; }
    moved = true;
  });
  n.el.addEventListener("pointerup", ev => {
    if(dragged !== n) return;
    dragged = null;
    if(!moved){
      if(n.kind === "hub"){ folded.has(n.id) ? folded.delete(n.id) : folded.add(n.id); render(); }
      select(n.id);
    }
  });
});

svg.addEventListener("pointerdown", ev => {
  panning = {x: ev.clientX, y: ev.clientY, tx, ty, moved:false};
  svg.classList.add("dragging");
});
svg.addEventListener("pointermove", ev => {
  if(!panning) return;
  const r = svg.getBoundingClientRect();
  const sc = W / r.width;
  tx = panning.tx + (ev.clientX - panning.x) * sc;
  ty = panning.ty + (ev.clientY - panning.y) * sc;
  if(Math.abs(ev.clientX - panning.x) + Math.abs(ev.clientY - panning.y) > 3) panning.moved = true;
  applyView();
});
svg.addEventListener("pointerup", () => {
  if(panning && !panning.moved) clearSel();
  panning = null; svg.classList.remove("dragging");
});
svg.addEventListener("wheel", ev => {
  ev.preventDefault();
  const [wx, wy] = toWorld(ev);
  const nk = Math.min(2.6, Math.max(0.4, k * (ev.deltaY < 0 ? 1.12 : 1/1.12)));
  tx += wx * (k - nk); ty += wy * (k - nk);
  k = nk; applyView();
}, {passive:false});

/* ---------------- controls ---------------- */
const crossBtn = document.getElementById("cross");
crossBtn.onclick = () => {
  showCross = !showCross;
  crossBtn.setAttribute("aria-pressed", showCross);
  clearSel(); render();
};
const collapseBtn = document.getElementById("collapse");
collapseBtn.onclick = () => {
  if(folded.size === GROUPS.length){ folded.clear(); collapseBtn.textContent = "collapse all"; }
  else { GROUPS.forEach(g => folded.add(g.id)); collapseBtn.textContent = "unfold all"; }
  clearSel(); render();
};
document.getElementById("reset").onclick = () => {
  folded.clear(); showCross = true;
  crossBtn.setAttribute("aria-pressed","true");
  collapseBtn.textContent = "collapse all";
  k = 1; tx = 0; ty = 0; applyView();
  clearSel(); render(); seed(); alpha = 1;
};

/* ---------------- size ---------------- */
function size(first){
  const r = document.querySelector(".stage").getBoundingClientRect();
  W = Math.max(320, r.width); H = Math.max(320, r.height);
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  if(first) seed();
  alpha = 1;
}
window.addEventListener("resize", () => size(false));
size(true);
applyView();
render();
requestAnimationFrame(step);
</script>
